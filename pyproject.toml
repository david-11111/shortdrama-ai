[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = [
    "frontend",
    "models",
    "storage",
    "data",
    "app/data",
    ".pytest_cache",
    "pytest-cache-files-*",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "ASYNC", "C4", "SIM"]
ignore = [
    "E501",
]

[tool.ruff.lint.per-file-ignores]
"alembic/versions/*.py" = ["E402"]
"tests/**/*.py" = ["B011"]

x-app-runtime-env: &app-runtime-env
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/saas_db
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2

services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:15-alpine
    environment:
      POSTGRES_DB: saas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saas_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: saas--api:latest
    env_file:
      - .env
    environment: *app-runtime-env
    volumes:
      - ./models:/app/models:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: on_failure:2

  api:
    image: saas--api:latest
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment: *app-runtime-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: always

  worker-video:
    image: saas--api:latest
    env_file:
      - .env
    environment:
      <<: *app-runtime-env
      CELERY_WORKER: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./models:/app/models:ro
    command: celery -A app.celery_app worker -Q video -c 4 --pool=threads -l info
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  wan-tunnel:
    image: saas--wan-tunnel:latest
    build:
      context: .
      dockerfile: Dockerfile.wan-tunnel
    env_file:
      - .env
    environment:
      WAN_SSH_PASSWORD: ${WAN_SSH_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8100/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  worker-image:
    image: saas--api:latest
    env_file:
      - .env
    environment:
      <<: *app-runtime-env
      CELERY_WORKER: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./models:/app/models:ro
    command: celery -A app.celery_app worker -Q image -c 10 --pool=threads -l info
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker-text:
    image: saas--api:latest
    env_file:
      - .env
    environment:
      <<: *app-runtime-env
      CELERY_WORKER: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./models:/app/models:ro
    command: celery -A app.celery_app worker -Q text -c 20 --pool=threads -l info
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker-admin:
    image: saas--api:latest
    env_file:
      - .env
    environment:
      <<: *app-runtime-env
      CELERY_WORKER: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./models:/app/models:ro
    command: celery -A app.celery_app worker -Q admin,default -c 2 --pool=threads -l info
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  beat:
    image: saas--api:latest
    env_file:
      - .env
    environment:
      <<: *app-runtime-env
      CELERY_WORKER: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./models:/app/models:ro
    command: celery -A app.celery_app beat -l info
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from app.celery_app import celery_app; r=celery_app.control.inspect(timeout=2).ping(); exit(0) if r else exit(1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: saas--nginx:latest
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

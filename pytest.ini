[pytest]
testpaths = tests
cache_dir = E:/tmp/saas_pytest_cache
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:cacheprovider
markers =
    smoke: core smoke tests (run on every PR)
    integration: integration tests (require DB + Redis)
    contract: API contract tests
    e2e: end-to-end browser tests (require running server)
    unit: unit tests (no external deps)

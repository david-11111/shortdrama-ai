version: "3.9"

services:
  postgres_test:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data  # 内存存储，测试结束自动清理

  redis_test:
    image: redis:7
    ports:
      - "6380:6379"
    command: redis-server --databases 16

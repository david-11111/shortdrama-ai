name: Security Scan

on:
  schedule:
    - cron: "0 2 * * 1"  # 每周一 02:00 UTC
  push:
    paths:
      - "requirements.txt"
      - "frontend/package.json"
      - "frontend/package-lock.json"
  workflow_dispatch:

jobs:
  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --format json -o pip-audit-report.json || true

      - name: Check for critical vulnerabilities
        run: |
          python - <<'EOF'
          import json, sys
          with open("pip-audit-report.json") as f:
              data = json.load(f)
          vulns = [v for dep in data.get("dependencies", []) for v in dep.get("vulns", [])]
          if vulns:
              print(f"Found {len(vulns)} vulnerabilities:")
              for v in vulns:
                  print(f"  {v['id']}: {v.get('description', '')[:120]}")
              sys.exit(1)
          print("No vulnerabilities found.")
          EOF

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  frontend-audit:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run npm audit
        run: npm audit --audit-level=high --json > npm-audit-report.json || true

      - name: Fail on high/critical
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const report = JSON.parse(fs.readFileSync("npm-audit-report.json", "utf8"));
          const { high = 0, critical = 0 } = report.metadata?.vulnerabilities ?? {};
          if (high + critical > 0) {
            console.error(`Found ${critical} critical and ${high} high severity vulnerabilities`);
            process.exit(1);
          }
          console.log("No high/critical vulnerabilities found.");
          EOF

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/npm-audit-report.json

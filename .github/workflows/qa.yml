name: QA — Smoke & Integration Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/saas_test
      TEST_REDIS_URL: redis://localhost:6379/15
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/saas_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
      APP_ENV: test
      APP_DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run database migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/saas_test

      - name: Run smoke tests
        run: pytest -m smoke --tb=short -q
        env:
          TEST_DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
          TEST_REDIS_URL: ${{ env.TEST_REDIS_URL }}

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: smoke

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/saas_test
      TEST_REDIS_URL: redis://localhost:6379/15
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/saas_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
      APP_ENV: test
      APP_DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run integration tests
        run: pytest -m integration --tb=short -q

      - name: Run contract tests
        run: pytest -m contract --tb=short -q

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: tests/reports/
          retention-days: 7
